services:
  - type: web
    name: codeforge-ai
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: codeforge.db
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JUDGE0_API_KEY
        sync: false
